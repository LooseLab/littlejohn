# ROBIN 0.8 env. If you see:
#   libstdc++.so.6: version `CXXABI_1.3.15' not found (required by scipy...)
# the dynamic linker is using the *system* libstdc++ instead of conda’s.
# Fix: (1) use libstdcxx-ng>=13, (2) install the activate hook so
# LD_LIBRARY_PATH prepends $CONDA_PREFIX/lib — see conda_env_hooks/robin_0_8/README.md
#
# conda-forge should win over defaults to avoid mixed runtimes:
#   conda config --set channel_priority strict
#
name: robin_0_8
channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  - python=3.12
  - pip

  # SciPy wheels need a recent libstdc++; CXXABI_1.3.15 needs GCC 13-class runtime.
  # >=12 is not always enough on older Ubuntu/Debian hosts.
  - libstdcxx-ng>=13
  - libgcc-ng>=13

  # core python scientific stack
  - numpy
  - scipy
  - scikit-learn
  - ruptures

  # bioinformatics
  - samtools
  - bedtools
  - snpsift
  - snpeff

  # R + Bioconductor
  - r-base
  - r-optparse
  - r-data.table
  - r-ranger
  - r-matrixstats
  - r-glmnet
  - bioconductor-genomicranges
  - bioconductor-genomeinfodb

  # graphics/system deps
  - git-lfs
  - pkg-config
  - cairo
  - pycairo
  - gobject-introspection