name: robin_0_5
channels:
  - bioconda
  - conda-forge
  - defaults
dependencies:
  - git-lfs
  - r-base=4.3.1
  - bioconda::snpsift
  - bioconda::snpeff
  - bioconda::samtools
  - bioconda::bedtools
  - r-optparse
  - r-data.table
  - conda-forge::r-ranger
  - r-matrixStats
  - r-glmnet
  - ruptures
  - python >=3.9.0,<3.9.19
  - pip
  - pip:
  #  - readfish
  #  - ont-pyguppy-client-lib
    - scikit-learn==1.0.2
    - scipy==1.12.0
    - psutil
    - setuptools<81  # Pin to avoid pkg_resources deprecation warnings
    #- git+https://github.com/LooseLab/robin
variables:
  _JAVA_OPTIONS: -Xmx8g

# Post-install script to install R packages
post-install:
  - Rscript install_r_packages.R



