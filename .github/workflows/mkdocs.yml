# Build MkDocs and publish to GitHub Pages.
# Repo Settings → Pages → Build and deployment: Source = "GitHub Actions".
#
# You can list any branch(es) below. A push to any of them deploys to the same
# site URL for this repo (the latest successful run wins). For docs-only testing,
# use e.g. only `mkdocs`; for production after merge, use only `main` or both.

name: Publish docs

on:
  push:
    branches:
      - main
      - mkdocs
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Install MkDocs
        run: pip install -r requirements-docs.txt

      - name: Build site
        run: mkdocs build --strict

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
